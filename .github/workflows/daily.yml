name: Generate Daily Fact

on:
  schedule:
    # Runs at 02:00 UTC and 14:00 UTC every day (giving you 4 articles daily)
    - cron: '0 2,14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install google-genai
        
      - name: Run the Fact Generator
        run: python script.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Save and Publish to Website
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Automated daily fact update" || exit 0
          git push
