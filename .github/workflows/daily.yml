name: Generate Daily News Posts

on:
  schedule:
    # Runs twice daily at 00:00 UTC and 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Required for GitHub Actions to push new posts back to the repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai openai

      - name: Run Dual-AI News Generator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python script.py

      - name: Commit and Push New Posts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --staged --quiet || git commit -m "Auto-generate 6 breaking news posts via Gemini & GPT-4o"
          git push
