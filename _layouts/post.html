---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/NewsArticle">

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%b %d, %Y" }}
      </time>
    </p>


    <script id="Cookiebot" src="https://consent.cookiebot.com/uc.js" data-cbid="ecaa34af-65d8-4cae-bd4f-1ceff2b2883a" type="text/javascript" async></script>


<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2ZHXDV8E00"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-2ZHXDV8E00');
</script>




    
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <hr style="margin-top: 40px; margin-bottom: 20px;" />

  <!-- INTERNAL LINKING WIDGET -->
  <h3>🔥 Recent Breaking News</h3>
  <ul>
    {% for post in site.posts limit:5 %}
      {% if post.url != page.url %}
        <li>
          <a href="{{ post.url | relative_url }}">{{ post.title }}</a> 
          <small>({{ post.date | date: "%b %d, %Y" }})</small>
        </li>
      {% endif %}
    {% endfor %}
  </ul>

  <!-- GOOGLE NEWS & SEARCH SCHEMA MARKUP -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": {{ page.title | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "mainEntityOfPage": {
       "@type": "WebPage",
       "@id": "{{ page.url | absolute_url }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "India Daily Facts",
      "logo": {
        "@type": "ImageObject",
        "url": "https://pishorkar.tech/assets/social-share.png"
      }
    }
  }
  </script>




<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2ZHXDV8E00"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-2ZHXDV8E00');
</script>

  
  

</article>
